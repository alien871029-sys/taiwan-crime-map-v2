<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>治安風險情報雷達</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* 硬派暗黑風格設定 */
        body, html { margin: 0; padding: 0; height: 100%; background-color: #121212; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #map { width: 100%; height: 100vh; }
        
        /* 情報圖例面板 */
        .legend {
            position: absolute; bottom: 30px; left: 10px; z-index: 1000;
            background: rgba(20, 20, 20, 0.9); padding: 15px; border-radius: 4px;
            color: #e0e0e0; border: 1px solid #444; box-shadow: 0 0 15px rgba(0,0,0,0.8);
        }
        .legend h4 { margin: 0 0 10px 0; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; color: #a9a9a9; border-bottom: 1px solid #444; padding-bottom: 5px;}
        .legend-item { display: flex; align-items: center; margin-bottom: 8px; font-size: 13px; font-weight: bold; }
        .color-box { width: 14px; height: 14px; border-radius: 50%; margin-right: 10px; border: 1px solid #fff; }
        
        /* 鑑識風格資訊卡 */
        .leaflet-popup-content-wrapper { background: #1e1e1e; color: #fff; border: 1px solid #555; border-radius: 2px; }
        .leaflet-popup-tip { background: #1e1e1e; }
        .popup-title { font-weight: bold; color: #ff4d4d; border-bottom: 1px dashed #555; padding-bottom: 6px; margin-bottom: 6px; font-size: 14px;}
    </style>
</head>
<body>
    <div id="map"></div>
    
    <div class="legend">
        <h4>案件類型情報</h4>
        <div id="legend-items"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. 初始化地圖 (預設中心點設定為台灣，暗黑模式底圖)
        const map = L.map('map').setView([23.6978, 120.9605], 7);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap &copy; CARTO',
            maxZoom: 18
        }).addTo(map);

        // 2. 案類顏色配置邏輯
        const colorMap = {
            '毒品': '#ff2a2a',   // 紅色警戒
            '竊盜': '#ffb300',   // 橘色警戒
            '詐欺': '#00d4ff',   // 藍色追蹤
            '暴力': '#ff007f',   // 桃紅高危
            '預設': '#888888'    // 灰色未分類
        };

        // 自動生成圖例面板
        const legendContainer = document.getElementById('legend-items');
        Object.keys(colorMap).forEach(type => {
            legendContainer.innerHTML += `
                <div class="legend-item">
                    <div class="color-box" style="background-color: ${colorMap[type]}"></div>
                    <span>${type}</span>
                </div>
            `;
        });

        // 3. 讀取與解析 JSON 數據
        fetch('data.json')
            .then(response => response.json())
            .then(data => {
                data.forEach(item => {
                    let lat, lng;
                    
                    // 容錯機制：自動判斷 JSON 欄位寫法
                    if (item.lat && item.lng) {
                        lat = item.lat; lng = item.lng;
                    } else if (item['經度'] && item['緯度']) {
                        lat = item['緯度']; lng = item['經度'];
                    } else if (item['經緯度']) {
                        const coords = item['經緯度'].split(',');
                        lat = parseFloat(coords[0]); lng = parseFloat(coords[1]);
                    }

                    if (lat && lng) {
                        // 抓取案類與行政區 (相容中英文欄位名稱)
                        const caseType = item['案類'] || item.type || item['案類別'] || '預設';
                        const region = item['完整行政區域'] || item.region || '位置情報';
                        const markerColor = colorMap[caseType] || colorMap['預設'];

                        // 建立圓形實戰氣泡標記
                        const marker = L.circleMarker([lat, lng], {
                            radius: 6,
                            fillColor: markerColor,
                            color: "#000",
                            weight: 1.5,
                            opacity: 1,
                            fillOpacity: 0.85
                        }).addTo(map);

                        // 綁定點擊後彈出的資訊卡
                        marker.bindPopup(`
                            <div class="popup-title">📍 ${region}</div>
                            <div><b>事件類型：</b> ${caseType}</div>
                            <div style="color:#aaa; font-size:11px; margin-top:5px;">座標: ${lat.toFixed(4)}, ${lng.toFixed(4)}</div>
                        `);
                    }
                });
            })
            .catch(err => console.error('情報讀取失敗，請確認 data.json 檔案是否存在:', err));
    </script>
</body>
</html>
